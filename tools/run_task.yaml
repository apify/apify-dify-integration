identity:
  name: run_task
  author: 'Apify'
  label:
    en_US: Run Task
description:
  human:
    en_US: Starts a pre-configured Apify actor task. You can optionally override its default input.
  llm: This tool executes a pre-configured actor task on the Apify platform by its unique identifier (taskId). An actor task already has a default input, but you can optionally provide a JSON object (input_override) to merge with or override the default settings. The `wait_for_finish` parameter controls the execution mode. The tool returns a JSON object containing the details of the actor run.
parameters:
  - name: taskId
    type: string
    required: true
    form: llm
    label:
      en_US: Task ID
    human_description:
      en_US: The unique ID of the actor task you want to run.
    llm_description: The unique identifier for the Apify actor task. This can be found in the Apify Console.
  - name: input_override
    type: string # Dify treats JSON input as a string; the Python code will parse it.
    required: false
    form: llm
    label:
      en_US: Input Override
    human_description:
      en_US: Optional. A JSON object to override the task&#39;s default input.
    llm_description: Optional. A JSON formatted string that will be merged with the task&#39;s default input. Any fields provided here will override the corresponding fields in the task&#39;s pre-configured input.
  - name: build
    type: string
    required: false
    form: llm
    label:
      en_US: Build
    human_description:
      en_US: The build tag or number to run (e.g., &quot;latest&quot; or &quot;1.2.3&quot;).
    llm_description: Optional. A specific build tag or number for the actor (e.g., &quot;latest&quot;, &quot;beta&quot;, &quot;1.2.3&quot;). Overrides the task&#39;s default build.
  - name: wait_for_finish
    type: boolean
    required: false
    form: llm
    label:
      en_US: Wait for Finish
    human_description:
      en_US: If checked, the tool will wait for the actor run to complete before returning.
    llm_description: A boolean (`true` or `false`). If `true`, the tool will wait for the run to reach a terminal state. If `false` (default), it returns immediately.
    default: false
  - name: timeout
    type: number
    required: false
    form: llm
    label:
      en_US: Timeout (seconds)
    human_description:
      en_US: Maximum time in seconds the actor is allowed to run.
    llm_description: Optional. The maximum number of seconds the actor run is allowed to execute. Overrides the task&#39;s default timeout.
  - name: memory
    type: number
    required: false
    form: llm
    label:
      en_US: Memory (MB)
    human_description:
      en_US: The amount of memory in megabytes to allocate to the actor run.
    llm_description: Optional. The amount of memory in megabytes to allocate for the run. Overrides the task&#39;s default memory setting.
extra:
  python:
    source: tools/run_task.py