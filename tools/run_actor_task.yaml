identity:
  name: run_actor_task
  author: 'Apify'
  label:
    en_US: Run Actor task
description:
  human:
    en_US: Runs an Actor Task and return all associated details. You can optionally override the Actor’s input configuration by providing a custom body.
  llm: This tool executes a pre-configured Actor task on the Apify platform by its unique identifier (taskId). An Actor task already has a default input, but you can optionally provide a JSON object (input_override) to merge with or override the default settings. The `wait_for_finish` parameter controls the execution mode. The tool returns a JSON object containing the details of the Actor run.
parameters:
  - name: taskId
    type: string
    required: true
    form: llm
    label:
      en_US: Task
    human_description:
      en_US: Actor task identifier - ID or an alias in either owner/task-name or owner~task-name format.
    llm_description: The unique identifier for the Apify Actor task. This can be found in the Apify Console.
  - name: input_override
    type: string
    required: false
    form: llm
    label:
      en_US: Input
    default: "{}"
    human_description:
      en_US: A JSON object to override the task input. Only the fields you provide are overridden; the rest stay as in the task's default configuration. Use an empty object {} if you don't want to override anything. See the task input page in Apify Console (https://console.apify.com) for the available fields.
    llm_description: Optional. A JSON object that overrides the task's default input. Only the fields you provide are overridden; all other fields remain unchanged. Use {} if you don't want to override any fields.
  - name: build
    type: string
    required: false
    form: llm
    label:
      en_US: Build
    human_description:
      en_US: Build to run. It can be either a build tag or build number. By default, the run uses the build specified in the default run configuration (typically `latest`).
    llm_description: Optional. A specific build tag or number for the Actor (e.g., "latest", "beta", "1.2.3"). Overrides the Actor task's default build.
  - name: wait_for_finish
    type: boolean
    required: false
    form: llm
    label:
      en_US: Wait for Finish
    human_description:
      en_US: If enabled, the step waits for the task run to finish before returning run details (e.g. run ID, status, defaultDatasetId). If disabled, it returns run details immediately after starting the run.
    llm_description: A boolean (`true` or `false`). If `true`, the tool will wait for the run to reach a terminal state. If `false` (default), it returns immediately.
    default: false
  - name: timeout
    type: number
    required: false
    form: llm
    min: 0
    label:
      en_US: Timeout
    human_description:
      en_US: Optional timeout for the run, in seconds. By default, the run uses a timeout specified in the default run configuration for the Actor task.
    llm_description: Optional. The maximum number of seconds the Actor run is allowed to execute. Overrides the Actor task's default timeout.
  - name: memory
    type: select
    required: false
    form: llm
    label:
      en_US: Memory
    human_description:
      en_US: Memory limit for the run, in megabytes. The amount of memory can be set to one of the available options. By default, the run uses a memory limit specified in the default run configuration for the Actor task.
    llm_description: Optional. The amount of memory in megabytes to allocate for the run. Overrides the Actor task's default memory setting.
    options:
      - value: 128
        label:
          en_US: 128 MB
      - value: 256
        label:
          en_US: 256 MB
      - value: 512
        label:
          en_US: 512 MB
      - value: 1024
        label:
          en_US: 1024 MB (1 GB)
      - value: 2048
        label:
          en_US: 2048 MB (2 GB)
      - value: 4096
        label:
          en_US: 4096 MB (4 GB)
      - value: 8192
        label:
          en_US: 8192 MB (8 GB)
      - value: 16384
        label:
          en_US: 16384 MB (16 GB)
      - value: 32768
        label:
          en_US: 32768 MB (32 GB)
output_schema:
  properties:
    result:
      type: object
      description: The details of the Actor task run.
      properties:
        id:
          type: string
          description: The unique identifier for the Actor run.
        status:
          type: string
          description: The current status of the Actor run.
        defaultDatasetId:
          type: string
          description: The ID of the default dataset associated with the Actor run.
        defaultKeyValueStoreId:
          type: string
          description: The ID of the default key-value store associated with the Actor run.
extra:
  python:
    source: tools/run_actor_task.py
