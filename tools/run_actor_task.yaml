identity:
  name: run_actor_task
  author: 'Apify'
  label:
    en_US: Run Actor task
description:
  human:
    en_US: Starts a pre-configured Apify Actor task. You can optionally override its default input.
  llm: This tool executes a pre-configured Actor task on the Apify platform by its unique identifier (taskId). An Actor task already has a default input, but you can optionally provide a JSON object (input_override) to merge with or override the default settings. The `wait_for_finish` parameter controls the execution mode. The tool returns a JSON object containing the details of the Actor run.
parameters:
  - name: taskId
    type: string
    required: true
    form: llm
    label:
      en_US: Task
    human_description:
      en_US: Actor task identifier - ID or an alias in either owner/task-name or owner~task-name format.
    llm_description: The unique identifier for the Apify Actor task. This can be found in the Apify Console.
  - name: input_override
    type: string
    required: false
    form: llm
    label:
      en_US: Input Override
    default: "{}"
    human_description:
      en_US: Optional. A JSON object to override the Actor task's default input. If empty, an empty JSON object {} will be used.
    llm_description: Optional. A JSON formatted string that will be merged with the Actor task's default input. Any fields provided here will override the corresponding fields in the Actor task's pre-configured input. If not provided, an empty JSON object {} will be used.
  - name: build
    type: string
    required: false
    form: llm
    label:
      en_US: Build
    human_description:
      en_US: The build tag or number to run (e.g., "latest" or "1.2.3").
    llm_description: Optional. A specific build tag or number for the Actor (e.g., "latest", "beta", "1.2.3"). Overrides the Actor task's default build.
  - name: wait_for_finish
    type: boolean
    required: false
    form: llm
    label:
      en_US: Wait for Finish
    human_description:
      en_US: If checked, the tool will wait for the Actor run to complete before returning.
    llm_description: A boolean (`true` or `false`). If `true`, the tool will wait for the run to reach a terminal state. If `false` (default), it returns immediately.
    default: false
  - name: timeout
    type: number
    required: false
    form: llm
    label:
      en_US: Timeout (seconds)
    human_description:
      en_US: Maximum time in seconds the Actor is allowed to run.
    llm_description: Optional. The maximum number of seconds the Actor run is allowed to execute. Overrides the Actor task's default timeout.
  - name: memory
    type: select
    required: false
    form: llm
    label:
      en_US: Memory (MB)
    human_description:
      en_US: The amount of memory in megabytes to allocate to the Actor run.
    llm_description: Optional. The amount of memory in megabytes to allocate for the run. Overrides the Actor task's default memory setting.
    default: 128
    options:
      - value: 128
        label:
          en_US: 128 MB
      - value: 256
        label:
          en_US: 256 MB
      - value: 512
        label:
          en_US: 512 MB
      - value: 1024
        label:
          en_US: 1024 MB (1 GB)
      - value: 2048
        label:
          en_US: 2048 MB (2 GB)
      - value: 4096
        label:
          en_US: 4096 MB (4 GB)
      - value: 8192
        label:
          en_US: 8192 MB (8 GB)
      - value: 16384
        label:
          en_US: 16384 MB (16 GB)
      - value: 32768
        label:
          en_US: 32768 MB (32 GB)
extra:
  python:
    source: tools/run_actor_task.py
