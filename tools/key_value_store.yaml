identity:
  name: get_key_value_store_record
  author: 'Apify'
  label:
    en_US: Get Key-Value Store Record
description:
  human:
    en_US: Retrieves a single record from a specified Apify key-value store.
  llm: This tool fetches a single record from an Apify key-value store using a store ID and a record key. It returns an object containing the records body and its content type.
parameters:
  - name: storeId
    type: string
    required: true
    form: llm
    label:
      en_US: Key-Value Store ID
    human_description:
      en_US: The unique ID of the key-value store.
    llm_description: The unique identifier for the Apify key-value store.
  - name: recordKey
    type: string
    required: true
    form: llm
    label:
      en_US: Key-Value Store Record Key
    human_description:
      en_US: The key of the record to be retrieved.
    llm_description: The key of the record to fetch from the specified store.
extra:
  python:
    source: tools/key_value_store.py
