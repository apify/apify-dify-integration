identity:
  name: get_key_value_store_record
  author: 'Apify'
  label:
    en_US: Get Key-Value Store Record
description:
  human:
    en_US: Retrieves a single record from a specified Apify key-value store.
  llm: This tool fetches a single record from an Apify key-value store using a store ID and a record key. It returns an object containing the records body and its content type.
parameters:
  - name: storeId
    type: string
    required: true
    form: llm
    label:
      en_US: Store ID
    human_description:
      en_US: The unique ID of the key-value store.
    llm_description: The unique identifier for the Apify key-value store.
  - name: recordKey
    type: string
    required: true
    form: llm
    label:
      en_US: Record Key
    human_description:
      en_US: The key of the record to retrieve.
    llm_description: The key of the record to fetch from the specified store.
  - name: format
    type: select
    required: false
    form: llm
    label:
      en_US: Format Hint
    human_description:
      en_US: Optional hint for the data format.
    llm_description: Optional. A hint for the expected format of the record. Can be auto, json, text, or binary.
    default: auto
    options:
      - value: auto
        label:
          en_US: Auto
      - value: json
        label:
          en_US: JSON
      - value: text
        label:
          en_US: Text
      - value: binary
        label:
          en_US: Binary
extra:
  python:
    source: tools/key_value_store.py