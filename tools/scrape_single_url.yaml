identity:
  name: scrape_single_url
  author: 'Apify'
  label:
    en_US: Scrape Single URL
description:
  human:
    en_US: Scrape a single URL using the Apify Website Content Crawler Actor and get its content as markdown and HTML.
  llm: |
    This tool scrapes a single web page using the Apify Website Content Crawler. It requires a URL. The `wait_for_finish` parameter is critical: if `true` (the default), it waits for the scrape to complete and returns an array of the scraped data items. If `false`, it starts the scrape and immediately returns a JSON object with the Actor run's details.
parameters:
  - name: url
    type: string
    required: true
    form: llm
    label:
      en_US: URL to scrape
    human_description:
      en_US: URL to be scraped. Must start with http:// or https:// and be a valid URL.
    llm_description: The complete and valid URL of the web page to be scraped.
  - name: crawler_type
    type: select
    required: true
    form: llm
    label:
      en_US: Crawler type
    human_description:
      en_US: The crawling engine to use for the scrape.
    llm_description: The type of crawler to use. Adaptive is a good default.
    default: playwright:adaptive
    options:
      - value: playwright:adaptive
        label:
          en_US: Adaptive
      - value: playwright:firefox
        label:
          en_US: Firefox (Headless Browser)
      - value: cheerio
        label:
          en_US: Cheerio (Raw HTTP)
      - value: jsdom
        label:
          en_US: JSDOM (Raw HTTP with JS)
output_schema:
  properties:
    result:
      type: object
      description: The scraped content from the URL.
      properties:
        url:
          type: string
          description: The URL that was scraped.
        crawl:
          type: object
          description: Crawl information.
        text:
          type: string
          description: The extracted text content from the page.
        markdown:
          type: string
          description: The page content converted to markdown format.
        html:
          type: string
          description: The raw HTML content of the page (if saveHtml was enabled).
        screenshotUrl:
          type: string
          description: URL to the screenshot of the page (if saveScreenshots was enabled).
        metadata:
          type: object
          description: Additional metadata about the scraped page.
extra:
  python:
    source: tools/scrape_single_url.py
