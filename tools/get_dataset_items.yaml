identity:
  name: get_dataset_items
  author: 'Apify'
  label:
    en_US: Get Dataset Items
description:
  human:
    en_US: Retrieves items from a dataset.
  llm: This tool fetches items from an Apify dataset. It requires a `datasetId`. Optional `limit` and `offset` parameters can be used for pagination. The tool returns an array of JSON objects, where each object is an item from the dataset.
parameters:
  - name: datasetId
    type: string
    required: true
    form: llm
    label:
      en_US: Dataset ID
    human_description:
      en_US: Dataset ID or `username~dataset-name`.
    llm_description: The unique identifier for the Apify dataset from which to fetch items.
  - name: limit
    type: number
    required: false
    form: llm
    min: 1
    label:
      en_US: Limit
    human_description:
      en_US: Maximum number of results to return.
    llm_description: Optional. Maximum number of results to return.
  - name: offset
    type: number
    required: false
    form: llm
    min: 0
    label:
      en_US: Offset
    human_description:
      en_US: Number of items that should be skipped at the start. The default value is `0`.
    llm_description: Optional. Number of items that should be skipped at the start. The default value is `0`.
output_schema:
  properties:
    result:
      type: object
      description: Dataset information including items, count, and dataset ID.
      properties:
        items:
          type: array
          description: Array of items from the dataset.
        count:
          type: number
          description: Number of items in the dataset.
        datasetId:
          type: string
          description: The ID of the dataset.
extra:
  python:
    source: tools/get_dataset_items.py
