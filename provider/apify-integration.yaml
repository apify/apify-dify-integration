identity:
  author: "apify"
  name: "apify-integration"
  label:
    en_US: "Apify"
  description:
    en_US: "A plugin to run Apify actors and tasks, allowing you to automate web scraping and data extraction workflows."
  icon: "icon.svg"

credentials_for_provider:
  apify_token:
    type: secret-input
    required: true
    label:
      en_US: Apify API Token
    placeholder:
      en_US: Enter your Apify API Token
    help:
      en_US: You can find your API token in your Apify account settings under the 'Integrations' tab.
    url: https://console.apify.com/account/integrations

tools:
  - tools/apify-integration.yaml

extra:
  python:
    source: provider/apify-integration.py