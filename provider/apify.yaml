identity:
  author: 'Apify'
  name: 'apify-integration'
  label:
    en_US: 'Apify'
  description:
    en_US: 'Apify is the largest marketplace of tools for web scraping, automation, and data for AI.'
  icon: 'apify.svg'
  tags:
    - utilities
    - productivity

oauth_schema:
  client_schema:
    - name: "client_id"
      label:
        en_US: "Apify OAuth Client ID"
      type: "secret-input"
      required: true
    - name: "client_secret"
      label:
        en_US: "Apify OAuth Client Secret"
      type: "secret-input"
      required: true
  credentials_schema:
    - name: "access_token"
      label:
        en_US: "Access Token"
      type: "secret-input"
    - name: "refresh_token"
      label:
        en_US: "Refresh Token"
      type: "secret-input"
    - name: "expires_at"
      label:
        en_US: "Expires At"
      type: "secret-input"

credentials_for_provider:
  apify_token:
    type: 'secret-input'
    required: false
    label:
      en_US: 'Apify API Token'
    help:
      en_US: "You can find your API token in your Apify account settings under the 'Integrations' tab."
    url: 'https://console.apify.com/account/integrations'
tools:
    - tools/run_actor.yaml
    - tools/run_actor_task.yaml
    - tools/scrape_single_url.yaml
    - tools/get_dataset_items.yaml
    - tools/key_value_store.yaml
extra:
  python:
    source: provider/apify.py