[tool.ruff]
# Exclude common non-source directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Formatting defaults
line-length = 120
indent-width = 4
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F"]
ignore = [
    "E203",  # keep consistent with Flake8's extend-ignore
]

# Allow fix for all enabled rules (when you pass --fix)
fixable = ["ALL"]
unfixable = []

# Per-file relaxations (match Flake8)
[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]


[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-line-length = "dynamic"
